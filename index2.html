<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sky Blue Birthday</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    font-family:'Poppins',sans-serif;
    overflow-x:hidden;
    background:#dff8ff;
    color:white;
}

/* MAIN CONTENT BLUR EFFECT ON OPEN */
#main-content {
    transition: filter 2.5s ease-in-out;
    filter: blur(15px);
}

#main-content.reveal {
    filter: blur(0px);
}

/* TOP NAVIGATION MENU */
.nav-menu {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 1000;
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.3);
    padding: 10px 30px;
    border-radius: 40px;
    display: flex;
    gap: 30px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
}

.nav-menu a {
    color: white;
    text-decoration: none;
    font-size: 16px;
    font-weight: 500;
    transition: 0.3s;
    letter-spacing: 1px;
}

.nav-menu a:hover {
    color: #dff8ff;
    text-shadow: 0 0 10px rgba(255, 255, 255, 0.6);
}

/* FLOATING EMOJIS (UPDATED: SIZE INCREASED FOR BETTER LOOK) */
.floating-emoji {
    position: absolute;
    font-size: 55px; /* আগের চেয়ে বড় করা হয়েছে */
    opacity: 0.25;
    pointer-events: none;
    z-index: 1;
    animation: floatAnimation 8s ease-in-out infinite;
}

.e-cake1 { top: 15%; left: 8%; animation-delay: 0s; }
.e-crown1 { top: 25%; right: 10%; animation-delay: 1.5s; font-size: 65px; }
.e-heart1 { top: 70%; left: 12%; animation-delay: 3s; }
.e-balloon1 { top: 45%; right: 7%; animation-delay: 0.5s; }

.e-cake2 { top: 15%; left: 10%; animation-delay: 2s; }
.e-crown2 { top: 65%; right: 12%; animation-delay: 0.8s; }
.e-heart2 { top: 35%; left: 8%; animation-delay: 3.5s; }
.e-star1 { top: 75%; left: 45%; animation-delay: 1s; }

.e-cake3 { top: 30%; right: 15%; animation-delay: 2.5s; }
.e-balloon2 { top: 65%; left: 15%; animation-delay: 1.2s; }
.e-star2 { top: 15%; left: 25%; animation-delay: 4s; }

@keyframes floatAnimation {
    0% { transform: translateY(0px) rotate(0deg); }
    50% { transform: translateY(-30px) rotate(15deg); }
    100% { transform: translateY(0px) rotate(0deg); }
}

/* INTRO / DOOR */
#intro{
    position:fixed;
    inset:0;
    z-index:99999;
    overflow:hidden;
    background:linear-gradient(135deg,#87ceeb,#4facfe,#00c6ff);
    transition: opacity 1s ease;
}

.door{
    position:absolute;
    width:50%;
    height:100%;
    background:linear-gradient(135deg,#38bdf8,#0ea5e9);
    transition:2.5s cubic-bezier(0.25, 1, 0.5, 1);
    top:0;
}

.left-door{
    left:0;
    border-right:3px solid rgba(255,255,255,.5);
}

.right-door{
    right:0;
    border-left:3px solid rgba(255,255,255,.5);
}

.ribbon{
    position:absolute;
    width:18px;
    height:100%;
    background:white;
    left:50%;
    transform:translateX(-50%);
}

.ribbon::before{
    content:"🎀";
    position:absolute;
    top:45%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:55px;
}

/* OPEN BUTTON (UPDATED: BLURY PLATE REMOVED) */
#openBtn{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    z-index:10;
    border:none;
    background: transparent; /* পেছনের ব্লারি প্লেট রিমুভ করা হয়েছে */
    color:white;
    padding:20px;
    font-size:42px; /* টেক্সট সাইজ সামান্য বাড়ানো হয়েছে */
    font-family:'Great Vibes',cursive;
    cursor:pointer;
    text-shadow: 0 0 20px rgba(255, 255, 255, 0.6); /* গ্লোয়িং ইফেক্ট */
    transition:.4s;
}

#openBtn:hover{
    transform:translate(-50%,-50%) scale(1.08);
    text-shadow: 0 0 30px rgba(255, 255, 255, 0.9);
}

.open-left{ transform:translateX(-100%); }
.open-right{ transform:translateX(100%); }

/* BG BOTTOM UP FLOATING EMOJIS */
.bg-emoji{
    position:fixed;
    font-size:35px;
    opacity:.12;
    animation:bgfloat 12s linear infinite;
    z-index:0;
    pointer-events:none;
}
.bg1{ left:5%; animation-duration:10s; }
.bg2{ left:20%; animation-duration:15s; }
.bg3{ left:35%; animation-duration:12s; }
.bg4{ left:50%; animation-duration:9s; }
.bg5{ left:70%; animation-duration:13s; }
.bg6{ left:85%; animation-duration:11s; }

@keyframes bgfloat{
    0%{ transform: translateY(100vh) rotate(0deg); }
    100%{ transform: translateY(-120vh) rotate(360deg); }
}

/* SECTION */
section{
    min-height:100vh;
    position:relative;
    padding:140px 20px 120px 20px;
    z-index:2;
}

/* HOME PAGE */
#home{
    background: linear-gradient(135deg,#87ceeb,#6dd5fa,#4facfe);
    display:flex;
    justify-content:center;
    align-items:center;
}

.home-box{
    width:95%;
    max-width:1200px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:60px;
    flex-wrap:wrap;
}

.left{ flex:1; }

.title{
    font-size:115px;
    font-family:'Great Vibes',cursive;
    line-height:1.1;
    text-shadow:0 0 20px rgba(255,255,255,.35);
}

.name{
    margin-top:20px;
    font-size:35px;
    letter-spacing:3px;
}

/* SHARED SCROLL STYLE */
.scroll, .scroll-page2{
    margin-top:70px;
    font-size:28px;
    font-family:'Great Vibes',cursive;
    animation:updown 2s infinite;
    text-align: center;
}

.scroll-page2 {
    margin-top: 50px;
    width: 100%;
}

@keyframes updown{
    0%, 100%{ transform:translateY(0); }
    50%{ transform:translateY(-10px); }
}

.right{
    flex:1;
    display:flex;
    justify-content:center;
    position:relative;
}

.right img{
    width:380px;
    height:500px;
    object-fit:cover;
    border-radius:35px;
    border:6px solid rgba(255,255,255,.35);
    box-shadow:0 0 40px rgba(255,255,255,.4);
    z-index:5;
}

/* PHOTO HEART ANIMATION */
.right::before, .right::after{
    content:"💙";
    position:absolute;
    font-size:28px;
    animation:heartFly 5s linear infinite;
    opacity:.9;
    z-index:6;
}
.right::before{ left:10%; bottom:0; }
.right::after{ right:10%; bottom:-40px; animation-delay:2s; }

@keyframes heartFly{
    0%{ transform: translateY(0) scale(.8); opacity:0; }
    20%{ opacity:1; }
    100%{ transform: translateY(-350px) scale(1.4); opacity:0; }
}

.love{
    position:absolute;
    font-size:22px;
    animation:miniFly 4s linear infinite;
    opacity:.9;
    z-index:6;
}
.love1{ left:15%; bottom:30px; }
.love2{ right:15%; bottom:10px; animation-delay:1.5s; }
.love3{ left:50%; bottom:-10px; animation-delay:3s; }

@keyframes miniFly{
    0%{ transform: translateY(0) scale(.7); opacity:0; }
    20%{ opacity:1; }
    100%{ transform: translateY(-250px) scale(1.3); opacity:0; }
}

/* PAGE 2 - MESSAGE LAYOUT */
#message {
    background: linear-gradient(135deg,#74ebd5,#6dd5fa,#4facfe);
}

.message-container {
    width: 100%;
    max-width: 1000px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 80px;
}

.msg-block {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 40px;
    width: 100%;
    position: relative;
    z-index: 5;
}

.msg-text {
    flex: 1.3;
    font-size: 24px;
    line-height: 1.8;
}

.text-right-align { text-align: right; }

.msg-photo {
    flex: 1;
    display: flex;
    justify-content: center;
}

.msg-photo img {
    width: 320px;
    height: 400px;
    object-fit: cover;
    border-radius: 30px;
    border: 5px solid rgba(255,255,255,.35);
    box-shadow: 0 0 30px rgba(255,255,255,.3);
}

/* PAGE 3 - BLUR BACKGROUND */
#wish{
    background: url('bg.jpg') no-repeat center center;
    background-size: cover;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

.overlay{
    position: absolute;
    inset: 0;
    backdrop-filter: blur(15px);
    background: rgba(0, 0, 0, 0.25);
}

.wish-box{
    position:relative;
    z-index:5;
    width:90%;
    max-width:900px;
    padding:60px;
    border-radius:40px;
    background:rgba(255,255,255,.12);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,.3);
    text-align:center;
}

.wish-title{
    font-size:90px;
    font-family:'Great Vibes',cursive;
}

.wish-text{
    margin-top:30px;
    font-size:28px;
    line-height:2;
}

/* ====== MOBILE RESPONSIVE CHANGES ====== */
@media(max-width:900px){

    .nav-menu {
        width: 85%;
        justify-content: center;
        gap: 15px;
        padding: 8px 15px;
        top: 15px;
    }

    .nav-menu a { font-size: 13px; }

    .floating-emoji {
        font-size: 38px !important; /* মোবাইলেও আগের চেয়ে সাইজ বড় করা হয়েছে */
    }

    .home-box{
        flex-direction: column;
        text-align: center;
        gap: 30px;
    }

    .title{ font-size: 65px; }
    .name{ font-size: 22px; letter-spacing: 2px; }
    .scroll { margin-top: 25px; font-size: 22px; }
    .scroll-page2 { margin-top: 30px; font-size: 22px; }
    .right { order: -1; }
    .right img{ width: 250px; height: 330px; }

    .message-container { gap: 40px; }

    .msg-block {
        display: flex !important;
        flex-direction: row !important;
        gap: 15px;
        align-items: center;
    }

    .msg-text {
        flex: 1.2;
        font-size: 13px;
        line-height: 1.5;
    }

    .msg-photo { flex: 1; }
    .msg-photo img {
        width: 100%;
        max-width: 130px;
        height: 170px;
        border-radius: 15px;
        border: 3px solid rgba(255,255,255,.35);
    }

    .wish-box { padding: 30px 20px; width: 95%; }
    .wish-title{ font-size: 48px; }
    .wish-text{ font-size: 18px; line-height: 1.7; }

    #openBtn{
        font-size: 30px;
        padding: 10px;
        width: auto;
        white-space: nowrap;
    }
    
    .ribbon::before { font-size: 45px; }
}

</style>

</head>

<body>

<div id="intro">
    <div class="door left-door">
        <div class="ribbon"></div>
    </div>
    <div class="door right-door">
        <div class="ribbon"></div>
    </div>
    <button id="openBtn">
        Tap To Open ✨
    </button>
</div>

<div id="main-content">

    <div class="nav-menu">
        <a href="#home">Home</a>
        <a href="#message">Messages</a>
        <a href="#wish">Wishes</a>
    </div>

    <audio id="music" loop preload="auto">
        <source src="music.mp3" type="audio/mp3">
    </audio>

    <div class="bg-emoji bg1">🎂</div>
    <div class="bg-emoji bg2">🎈</div>
    <div class="bg-emoji bg3">💙</div>
    <div class="bg-emoji bg4">🦋</div>
    <div class="bg-emoji bg5">🎉</div>
    <div class="bg-emoji bg6">✨</div>

    <section id="home">
        <div class="floating-emoji e-cake1">🎂</div>
        <div class="floating-emoji e-crown1">👑</div>
        <div class="floating-emoji e-balloon1">🎈</div>

        <div class="home-box">
            <div class="left">
                <h1 class="title">Happy <br> Birthday</h1>
                <div class="name">YOUR NAME</div>
                <div class="scroll">Scroll For Next Page ↓</div>
            </div>
            <div class="right">
                <img src="photo1.jpg">
                <div class="love love1">💙</div>
                <div class="love love2">🤍</div>
                <div class="love love3">🩵</div>
            </div>
        </div>
    </section>

    <section id="message">
        <div class="floating-emoji e-cake2">🎂</div>
        <div class="floating-emoji e-crown2">👑</div>
        <div class="floating-emoji e-heart2">💖</div>
        <div class="floating-emoji e-star1">✨</div>

        <div class="message-container">
            <div class="msg-block">
                <div class="msg-text">
                    Write your first beautiful
                    message here...
                </div>
                <div class="msg-photo">
                    <img src="photo2.jpg">
                </div>
            </div>
            <div class="msg-block">
                <div class="msg-photo">
                    <img src="photo3.jpg">
                </div>
                <div class="msg-text text-right-align">
                    Write your second beautiful
                    message here...
                </div>
            </div>
            
            <div class="scroll-page2">
                Scroll For Final Page ↓
            </div>
        </div>
    </section>

    <section id="wish">
        <div class="overlay"></div>
        
        <div class="floating-emoji e-cake3">🎂</div>
        <div class="floating-emoji e-balloon2">🎈</div>
        <div class="floating-emoji e-star2">✨</div>
        <div class="floating-emoji e-heart1">💙</div>

        <div class="wish-box">
            <div class="wish-title">Final Wish</div>
            <div class="wish-text">
                Write your final wish here...<br>
                Stay happy forever ✨
            </div>
        </div>
    </section>

</div>

<script>

const openBtn = document.getElementById("openBtn");
const intro = document.getElementById("intro");
const leftDoor = document.querySelector(".left-door");
const rightDoor = document.querySelector(".right-door");
const music = document.getElementById("music");
const mainContent = document.getElementById("main-content");

openBtn.addEventListener("click", () => {
    leftDoor.classList.add("open-left");
    rightDoor.classList.add("open-right");
    
    music.play().catch(error => {
        console.log("Audio play failed:", error);
    });

    setTimeout(() => {
        mainContent.classList.add("reveal");
    }, 100);

    setTimeout(() => {
        intro.style.display = "none";
    }, 2500);
});

</script>

</body>
</html>
